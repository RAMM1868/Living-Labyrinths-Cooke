<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cooke Flipbook</title>

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    #flipbook {
      width: 100vw;
      height: 100vh;
    }

    /* Progress bar */
    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 6px;
      background: #4caf50;
      width: 0%;
      transition: width 0.3s ease;
      z-index: 9999;
    }

    /* Restart button */
    #backToStart {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      z-index: 10000;
      font-family: sans-serif;
    }

    #backToStart:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Page numbers */
    #pageNumber {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 16px;
      font-family: sans-serif;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 6px;
      z-index: 10000;
    }
  </style>
</head>

<body>
  <div id="flipbook"></div>

  <div id="progress"></div>
  <div id="backToStart">Restart</div>
  <div id="pageNumber">Page 1 / 25</div>

  <!-- StPageFlip -->
  <script src="pageflip/page-flip.browser.js"></script>

  <script>
    const totalPages = 25;

    // Build image list
    const pages = [];
    for (let i = 1; i <= totalPages; i++) {
      pages.push(`images/${i}.jpg`);
    }

    // Create flipbook
    const flipbook = new St.PageFlip(document.getElementById('flipbook'), {
      width: 800,
      height: 1000,
      size: 'stretch',
      showCover: false,
      maxShadowOpacity: 0.5,
      usePortrait: false,
      mobileScrollSupport: false
    });

    flipbook.loadFromImages(pages);

    // Initial progress bar
    document.getElementById("progress").style.width = "0%";

    // Update progress bar + page numbers on flip
    flipbook.on("flip", (e) => {
      const current = e.data; // zero-based index
      const percent = (current / (pages.length - 1)) * 100;

      document.getElementById("progress").style.width = percent + "%";
      document.getElementById("pageNumber").innerText =
        `Page ${current + 1} / ${totalPages}`;
    });

    // Restart button
    document.getElementById("backToStart").onclick = () => {
      flipbook.flip(0); // jump to first page
      document.getElementById("progress").style.width = "0%";
      document.getElementById("pageNumber").innerText = "Page 1 / 25";
    };
  </script>
</body>
</html>
